    access-key: YvX7lhLM7oqQqBfd1Naq  # 敏感信息建议加密存储
    secret-key: rzd39NLve6ZM5A3pxDyo1MbX7IsSaBm7jnb3kIvh  # 建议使用环境变量注入
    bucket-name: poster-design  # 存储桶名称

