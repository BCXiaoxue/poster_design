#      host: 122.51.51.36
#      port: 6379
#      # 生产环境建议添加password配置
#      # 建议添加连接池配置（lettuce.pool）

  data:
    redis:
      sentinel:
        master: mymaster
        nodes:
        - 122.51.51.36:27001
        - 122.51.51.36:27002
        - 122.51.51.36:27003
      password: redis_admin_govy

