# 服务器配置
server:
  port: 8080  # 服务监听端口，生产环境建议使用标准端口如80/443
  tomcat:
    max-http-form-post-size: 10MB

logging:
  charset:
    console: UTF-8

# Spring基础配置
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    type: com.zaxxer.hikari.HikariDataSource  # 使用高性能的Hikari连接池
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/poster_design?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    # 生产环境建议启用SSL并配置证书（移除useSSL=false）
    # 请在 application-local.yaml 或环境变量中配置真实数据库连接信息
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your-db-password}
    hikari:
      connection-test-query: SELECT 1  # 连接验证查询（MySQL 8+建议使用connection-init-sql）
      connection-timeout: 60000  # 连接超时时间（毫秒）
      idle-timeout: 500000  # 空闲连接超时时间
      max-lifetime: 540000  # 连接最大生命周期，建议小于数据库的wait_timeout
      maximum-pool-size: 12  # 最大连接数，根据数据库配置调整
      minimum-idle: 10  # 最小空闲连接数
      pool-name: SPHHikariPool  # 连接池名称（便于监控识别）
  
  jackson:
    time-zone: Asia/Shanghai  # 使用更标准的时区标识

#  data:
#    redis:
#      database: 0  # Redis数据库索引
#      host: localhost
#      port: 6379
#      # 生产环境建议添加password配置
#      # 建议添加连接池配置（lettuce.pool）

  data:
    redis:
      sentinel:
        master: mymaster
        nodes:
        - ${REDIS_HOST:localhost}:${REDIS_SENTINEL_PORT1:27001}
        - ${REDIS_HOST:localhost}:${REDIS_SENTINEL_PORT2:27002}
        - ${REDIS_HOST:localhost}:${REDIS_SENTINEL_PORT3:27003}
      password: ${REDIS_PASSWORD:your-redis-password}

# MyBatis-Plus配置
mybatis-plus:
  configuration:
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开启SQL日志（生产环境应关闭）
    map-underscore-to-camel-case: true #开启字段自动转换

# 自定义MinIO配置
govy:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:your-minio-access-key}
    secret-key: ${MINIO_SECRET_KEY:your-minio-secret-key}
    bucket-name: ${MINIO_BUCKET:poster-design}

# 阿里云服务配置（强烈建议使用加密配置）
aliyun:
  sms:
    access-key-id: yourkeyid  # 高风险信息，必须加密！
    access-key-secret: yoursecret  # 高风险信息，必须加密！
    endpoint: dysmsapi.aliyuncs.com


